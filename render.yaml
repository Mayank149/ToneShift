services:
  - type: web
    name: toneshift-audience-aware-rewriter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
